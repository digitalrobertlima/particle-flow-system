<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de partículas interativas com física avançada">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Particle Flow System - Impressão Visual</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .header {
            text-align: center;
            z-index: 10;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
            animation: pulse 3s infinite;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ff7e5f, #feb47b, #86a8e7, #91eae4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .particle-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            z-index: 10;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            text-align: center;
            z-index: 10;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .highlight {
            color: #ff7e5f;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Particle Flow System</h1>
        <div class="subtitle">Sistema de Partículas Interativas com Física Avançada</div>
        <div class="instructions">
            <p>Mova o mouse para interagir | Clique para criar explosão de partículas</p>
        </div>
    </div>

    <div class="particle-counter">
        Partículas: <span id="count">0</span>
    </div>

    <canvas id="particleCanvas"></canvas>

    <div class="footer">
        Desenvolvido com <span class="highlight">❤</span> para impressionar você!
    </div>

    <script>
        // Configuração do canvas
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const particleCountElement = document.getElementById('count');

        // Ajustar canvas ao tamanho da tela
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Configurações das partículas
        const particles = [];
        const mouse = { x: 0, y: 0, radius: 100 };
        let particleId = 0;

        // Cores para as partículas
        const colors = [
            '#FF5252', '#FF4081', '#E040FB', '#7C4DFF', 
            '#536DFE', '#448AFF', '#40C4FF', '#18FFFF',
            '#64FFDA', '#69F0AE', '#B2FF59', '#EEFF41',
            '#FFFF00', '#FFD740', '#FFAB40', '#FF6E40'
        ];

        // Classe de partícula
        class Particle {
            constructor(x, y, isMouseGenerated = false) {
                this.id = particleId++;
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = Math.random() * 5 + 1;
                this.baseSize = this.size;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.oscillation = Math.random() * 0.05;
                this.oscillationAngle = Math.random() * Math.PI * 2;
                this.isMouseGenerated = isMouseGenerated;
                this.life = isMouseGenerated ? 100 : 300;
                this.maxLife = this.life;
            }

            update() {
                // Movimento oscilante
                this.oscillationAngle += this.oscillation;
                this.x += this.speedX + Math.sin(this.oscillationAngle) * 0.5;
                this.y += this.speedY + Math.cos(this.oscillationAngle) * 0.5;

                // Reação à proximidade do mouse
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < mouse.radius) {
                    const force = (mouse.radius - distance) / mouse.radius;
                    const angle = Math.atan2(dy, dx);
                    const tx = this.x + Math.cos(angle) * force * 10;
                    const ty = this.y + Math.sin(angle) * force * 10;
                    
                    this.speedX += (tx - this.x) * 0.05;
                    this.speedY += (ty - this.y) * 0.05;
                    
                    this.size = this.baseSize + force * 5;
                } else {
                    this.size = this.baseSize;
                }

                // Friction
                this.speedX *= 0.95;
                this.speedY *= 0.95;

                // Bounce nos bordas
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -0.8;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -0.8;

                // Mantém dentro dos limites
                this.x = Math.max(0, Math.min(canvas.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height, this.y));

                // Reduz vida se gerado pelo mouse
                if (this.isMouseGenerated) {
                    this.life--;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.closePath();
                
                // Glow effect
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.opacity * 0.3;
                ctx.fill();
                ctx.closePath();
            }
        }

        // Inicializar partículas
        function initParticles(count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
            updateParticleCounter();
        }

        // Atualizar contador de partículas
        function updateParticleCounter() {
            particleCountElement.textContent = particles.length;
        }

        // Animação
        function animate() {
            ctx.fillStyle = 'rgba(15, 12, 41, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Atualizar e desenhar partículas
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                // Remover partículas com vida esgotada
                if (particles[i].isMouseGenerated && particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }

            updateParticleCounter();
            requestAnimationFrame(animate);
        }

        // Eventos do mouse
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            // Criar explosão de partículas no clique
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                const particle = new Particle(e.clientX, e.clientY, true);
                particle.speedX = Math.cos(angle) * speed;
                particle.speedY = Math.sin(angle) * speed;
                particles.push(particle);
            }
        });

        // Touch events para dispositivos móveis
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                const particle = new Particle(e.touches[0].clientX, e.touches[0].clientY, true);
                particle.speedX = Math.cos(angle) * speed;
                particle.speedY = Math.sin(angle) * speed;
                particles.push(particle);
            }
        });

    // Iniciar sistema
    initParticles(100);
    animate();

    // Adicionar mais partículas periodicamente
    setInterval(() => {
        if (particles.length < 300) {
            particles.push(new Particle());
        }
    }, 1000);

    // Registrar service worker para PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then((registration) => {
                    console.log('Service Worker registrado com sucesso:', registration);
                })
                .catch((error) => {
                    console.log('Erro ao registrar Service Worker:', error);
                });
        });
    }
    </script>
</body>
</html>
